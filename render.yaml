# Render Blueprint — 토스 Open API 를 쓰는 작업만 여기서 돈다.
#
# 왜 나눴나
#   토스는 **IP 화이트리스트** 방식이라 GitHub Actions 처럼 러너 IP 가
#   매번 바뀌는 환경에서는 호출이 전부 403 ip-not-allowed 로 막힌다.
#   → 토스를 안 쓰는 뉴스·감성·보존정리는 GitHub Actions 에 두고,
#     토스를 쓰는 시세·계좌·전략만 고정 IP 를 가진 여기로 옮긴다.
#
# ⚠️ region 을 반드시 고정할 것
#   Render 의 outbound IP 는 **지역별로 다르다**. 지역이 바뀌면 IP 가 바뀌고,
#   토스에 등록해둔 화이트리스트가 통째로 무효가 된다.
#   singapore = 한국에서 가장 가까움.
#
# 배포 후 필수
#   대시보드 → 서비스 → Connect → Outbound 탭의 IP 를 **전부**
#   토스증권 WTS → 설정 → Open API → 허용 IP 에 등록한다.
#   (허용 개수 제한이 없으므로 나오는 대로 다 넣으면 된다)
#
# 비용
#   cron 서비스당 **월 최소 $1**, 실행 시간은 초 단위 정산.
#   서비스가 2개이므로 최소 $2/월 + 실행분.

services:
  # 장중 1분봉 — 평일 KST 09~16시 매시 정각 (UTC 00~07시)
  - type: cron
    name: toss-market
    runtime: python
    plan: starter
    region: singapore
    schedule: "0 0-7 * * 1-5"
    buildCommand: pip install -r requirements.txt
    startCommand: python3 worker/main.py market
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: TOSS_CLIENT_ID
        sync: false
      - key: TOSS_CLIENT_SECRET
        sync: false
      - key: CREDENTIAL_MASTER_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TZ
        value: Asia/Seoul

  # 일간 배치 — KST 08시 / 21시 (UTC 23시 / 12시)
  #   일봉·지표·13F·애널리스트·브리핑·공포탐욕 → 사용자별 포트폴리오·전략
  - type: cron
    name: toss-daily
    runtime: python
    plan: starter
    region: singapore
    schedule: "30 23,12 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python3 worker/main.py daily
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: TOSS_CLIENT_ID
        sync: false
      - key: TOSS_CLIENT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DART_API_KEY
        sync: false
      - key: CREDENTIAL_MASTER_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TZ
        value: Asia/Seoul
